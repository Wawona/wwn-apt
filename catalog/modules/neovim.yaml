id: neovim
name: Neovim
version: 0.10.0
section: editors
description: Hyperextensible Vim-based text editor (PUC Lua, in-process on Apple mobile).
maintainer: Wawona Team <team@wawona.io>
status: approved
license: Apache-2.0
app_store_notes: Text editor; nvim/vi/vim dispatch to wawona_nvim_main.

wwn_repo: wwn-neovim
registry_key: neovim
dispatch:
  commands:
    - nvim
    - vi
    - vim
  symbol: wawona_nvim_main

depends: []
conflicts: []
replaces: []

platforms:
  ios:
    storekit:
      product_id: io.wawona.module.neovim
    odr:
      tag: wwn-module-neovim
      bundle_subpath: Modules/neovim
